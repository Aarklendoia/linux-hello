<?xml version="1.0" encoding="UTF-8"?>
<!--
  Linux Hello — Application icon
  Style: KDE Breeze (Plasma 6)
  Grid: 32×32 Breeze units (scalable SVG)
  Palette: Breeze Blue #3daee9, Breeze Green #1cdc9a, Breeze Dark #232629
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Fond dégradé Breeze Blue -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3daee9"/>
      <stop offset="100%" stop-color="#1d81c4"/>
    </linearGradient>
    <!-- Reflet haut du fond -->
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Badge vert dégradé Breeze -->
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1cdc9a"/>
      <stop offset="100%" stop-color="#11a37a"/>
    </linearGradient>
    <!-- Ombre portée douce -->
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="125%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#232629" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- ── Fond arrondi (style app icon Breeze) ── -->
  <rect x="1" y="1" width="30" height="30" rx="7" ry="7"
        fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Reflet haut pour donner du relief -->
  <rect x="1" y="1" width="30" height="15" rx="7" ry="7"
        fill="url(#shine)"/>

  <!-- ── Coins de détection faciale (face-ID style) ── -->
  <g stroke="white" stroke-width="1.6" fill="none"
     stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <!-- haut-gauche -->
    <path d="M6 11 L6 7 L10 7"/>
    <!-- haut-droit -->
    <path d="M26 11 L26 7 L22 7"/>
    <!-- bas-gauche -->
    <path d="M6 21 L6 25 L10 25"/>
    <!-- bas-droit -->
    <path d="M26 21 L26 25 L22 25"/>
  </g>

  <!-- ── Silhouette du visage ── -->
  <!-- Tête -->
  <ellipse cx="16" cy="14.5" rx="5.5" ry="6.5"
           fill="white" fill-opacity="0.95"/>
  <!-- Cou + épaules (corps stylisé) -->
  <path d="M10.5 25 Q10.5 20 16 20 Q21.5 20 21.5 25"
        fill="white" fill-opacity="0.85"/>

  <!-- ── Traits du visage ── -->
  <!-- Œil gauche -->
  <ellipse cx="13.5" cy="13" rx="1.2" ry="1.4" fill="#1d81c4"/>
  <!-- Œil droit -->
  <ellipse cx="18.5" cy="13" rx="1.2" ry="1.4" fill="#1d81c4"/>
  <!-- Reflets dans les yeux -->
  <circle cx="14" cy="12.5" r="0.45" fill="white"/>
  <circle cx="19" cy="12.5" r="0.45" fill="white"/>
  <!-- Sourire -->
  <path d="M13.5 16.2 Q16 18.2 18.5 16.2"
        stroke="#1d81c4" stroke-width="1.1" fill="none"
        stroke-linecap="round"/>

  <!-- ── Badge "authentifié" (bas-droit) ── -->
  <circle cx="24.5" cy="24.5" r="4.5" fill="url(#badge)"/>
  <!-- Coche -->
  <path d="M22.5 24.5 L24 26 L26.5 22.8"
        stroke="white" stroke-width="1.4" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
