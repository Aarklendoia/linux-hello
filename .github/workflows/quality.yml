name: Code Quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      
      - name: Check formatting
        run: cargo fmt --all -- --check
  
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libpam0g-dev \
            libv4l-dev \
            libjpeg-dev \
            libclang-dev \
            clang \
            pkg-config
      
      - name: Run clippy
        run: cargo clippy --all --all-targets -- -D warnings
  
  security:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install security tools
        run: cargo install cargo-audit
      
      - name: Run cargo-audit
        # Note: The following advisories are ignored:
        # RUSTSEC-2023-0071 (rsa timing sidechannel) - transitive via sqlx, low practical risk
        # RUSTSEC-2024-0436 (paste unmaintained) - non-critical, only used in sqlx macros
        run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2024-0436

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libpam0g-dev \
            libv4l-dev \
            libjpeg-dev \
            libclang-dev \
            clang \
            pkg-config \
            dbus

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v6
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-coverage-${{ hashFiles('**/Cargo.lock') }}

      - name: Generate coverage report
        # Visibility only, not a merge gate: no --fail-under-* threshold.
        # Same LINUX_HELLO_NO_MODEL_DOWNLOAD rationale as test.yml (no
        # ORT_DYLIB_PATH in CI, so the ONNX stub fallback is used).
        env:
          LINUX_HELLO_NO_MODEL_DOWNLOAD: "1"
        run: |
          cargo llvm-cov --workspace --profile ci --html --output-dir coverage-html
          cargo llvm-cov report --profile ci --summary-only

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: coverage-html
          retention-days: 30

