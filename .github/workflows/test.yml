name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libpam0g-dev \
            libv4l-dev \
            libjpeg-dev \
            libclang-dev \
            clang \
            pkg-config \
            dbus

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-ci-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        # Utilise le profil CI (pas --release) pour éviter LTO + codegen-units=1
        # qui rendent la compilation >1h. Les tests ne nécessitent pas les
        # optimisations release pour être corrects.
        env:
          # Pas de ORT_DYLIB_PATH : le fallback stub est utilisé si libonnxruntime absent
          LINUX_HELLO_NO_MODEL_DOWNLOAD: "1"
        run: |
          cargo test --all --profile ci

      - name: Run clippy
        run: |
          cargo clippy --all -- -D warnings || true
